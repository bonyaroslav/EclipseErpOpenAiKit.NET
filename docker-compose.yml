services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - ./.azurite:/data

  mock-erp:
    build:
      context: .
      dockerfile: mocks/Mock.Erp/Dockerfile
    container_name: mock-erp
    ports:
      - "5080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
